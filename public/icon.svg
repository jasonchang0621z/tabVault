<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Background: rounded square -->
  <rect width="128" height="128" rx="28" fill="#2563EB"/>

  <!-- Vault door body -->
  <rect x="28" y="36" width="72" height="60" rx="8" fill="white" opacity="0.95"/>

  <!-- Tab indicators on top -->
  <rect x="28" y="28" width="24" height="16" rx="4 4 0 0" fill="white" opacity="0.7"/>
  <rect x="56" y="28" width="24" height="16" rx="4 4 0 0" fill="white" opacity="0.5"/>
  <rect x="84" y="28" width="16" height="16" rx="4 4 0 0" fill="white" opacity="0.3"/>

  <!-- Vault lock circle -->
  <circle cx="64" cy="66" r="16" fill="none" stroke="#2563EB" stroke-width="3.5"/>

  <!-- Lock handle / dial marks -->
  <circle cx="64" cy="66" r="5" fill="#2563EB"/>
  <line x1="64" y1="50" x2="64" y2="55" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="64" y1="77" x2="64" y2="82" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="48" y1="66" x2="53" y2="66" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="75" y1="66" x2="80" y2="66" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
</svg>
